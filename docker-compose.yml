services:
  finpuc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finpuc-app
    ports:
      - "${FINPUC_PORT:-8080}:8000"
    environment:
      DATA_DIR: /data/Historical_Stocks
      DB_PATH: /data/finpuc_cache.db
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./Data/Historical_Stocks:/data/Historical_Stocks:ro
      - finpuc_cache:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: unless-stopped

volumes:
  finpuc_cache:
