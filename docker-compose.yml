services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    volumes:
      # Datos históricos (solo lectura dentro del contenedor)
      - ./Data/Historical_Stocks:/data/Historical_Stocks:ro
      # Volumen nombrado para la DB SQLite (persiste entre reinicios)
      - webapp_cache:/data
    environment:
      - DATA_DIR=/data/Historical_Stocks
      - DB_PATH=/data/webapp_cache.db
    restart: unless-stopped

volumes:
  webapp_cache:
